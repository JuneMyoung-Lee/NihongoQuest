<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tail -->
  <ellipse cx="10" cy="47" rx="9" ry="5" fill="#f59e0b" transform="rotate(-22,10,47)"/>
  <ellipse cx="9"  cy="45" rx="5" ry="3" fill="#fef9c3" transform="rotate(-22,9,45)"/>
  <!-- Body -->
  <ellipse cx="32" cy="41" rx="16" ry="12" fill="#f59e0b"/>
  <!-- Head -->
  <circle  cx="32" cy="22" r="12" fill="#f59e0b"/>
  <!-- Ears -->
  <polygon points="18,14 14,3 24,11"   fill="#f59e0b"/>
  <polygon points="19,12 16,5 23,10"   fill="#fca5a5"/>
  <polygon points="46,14 50,3 40,11"   fill="#f59e0b"/>
  <polygon points="45,12 48,5 41,10"   fill="#fca5a5"/>
  <!-- Eyes -->
  <ellipse cx="27" cy="21" rx="2.5" ry="3"   fill="#1c1917"/>
  <ellipse cx="37" cy="21" rx="2.5" ry="3"   fill="#1c1917"/>
  <circle  cx="27.8" cy="20" r="0.9" fill="white"/>
  <circle  cx="37.8" cy="20" r="0.9" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="32" cy="27" rx="5" ry="4" fill="#fef9c3"/>
  <!-- Nose -->
  <ellipse cx="32" cy="25" rx="2" ry="1.5" fill="#1c1917"/>
  <!-- Whiskers -->
  <line x1="20" y1="26" x2="27" y2="27" stroke="#92400e" stroke-width="0.8"/>
  <line x1="20" y1="28" x2="27" y2="28" stroke="#92400e" stroke-width="0.8"/>
  <line x1="44" y1="26" x2="37" y2="27" stroke="#92400e" stroke-width="0.8"/>
  <line x1="44" y1="28" x2="37" y2="28" stroke="#92400e" stroke-width="0.8"/>
  <!-- Paws -->
  <ellipse cx="22" cy="51" rx="6" ry="4" fill="#f59e0b"/>
  <ellipse cx="42" cy="51" rx="6" ry="4" fill="#f59e0b"/>
</svg>
